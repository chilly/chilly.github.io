 </div><div class="line">   &#125;</div><div class="line">   printALL(backup_allocate,backup_need,backup_total);</div><div class="line">  &#125;</div><div class="line">//  if(c!=0)</div><div class="line">//   printALL(backup_allocate,backup_need,backup_total);</div><div class="line">//if no process is finished,it means no resource is collect once.Then the deadlock appears.</div><div class="line">  if(count==0)</div><div class="line">  &#123;</div><div class="line">   delete []backup_total;</div><div class="line">   for(i=0;i&lt;num_process;i++)</div><div class="line">   &#123; delete[]backup_allocate[i];</div><div class="line">    delete[]backup_need[i];</div><div class="line">   &#125;</div><div class="line">   delete []backup_allocate;</div><div class="line">   delete []backup_need;</div><div class="line">   return true;</div><div class="line">  &#125;</div><div class="line"> &#125;</div><div class="line"></div><div class="line"> return false;</div><div class="line">&#125;</div><div class="line">void printALL(int**b_allocate,int** b_need,int* b_total)</div><div class="line">&#123;</div><div class="line"> int i,q;</div><div class="line"> cout &lt;&lt; &quot;Allocate need&quot;&lt;&lt;endl;</div><div class="line"> for(i=0;i&lt;num_process;i++)</div><div class="line"> &#123; </div><div class="line">  for(q=0;q&lt;num_resource;q++)</div><div class="line">  &#123;</div><div class="line">   cout &lt;&lt; b_allocate[i][q]&lt;&lt;&quot;  &quot;;</div><div class="line">  &#125;</div><div class="line">  cout &lt;&lt; &quot; &quot;;</div><div class="line">  for(q=0;q&lt;num_resource;q++)</div><div class="line">   cout &lt;&lt; b_need[i][q]&lt;&lt;&quot;  &quot;;</div><div class="line">  cout &lt;&lt; endl;</div><div class="line"> &#125;</div><div class="line"> cout &lt;&lt; &quot;total&quot;&lt;&lt;endl;</div><div class="line"> for(i=0;i&lt;num_resource;i++)</div><div class="line">  cout &lt;&lt; b_total[i]&lt;&lt;&quot;  &quot;;</div><div class="line"> cout &lt;&lt; endl;</
